<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- opaque white background -->
  <rect width="512" height="512" fill="#ffffff"/>

  <!-- droplet, centered at (256,256), slightly tilted, hand-drawn vibe -->
  <g transform="translate(256 256) rotate(-5)">
    <!-- main filled body (bbox centered around 0,0) -->
    <path d="
      M -11 -166
      C -89 -70, -145 8, -129 78
      C -109 148, 11 166, 85 130
      C 145 98, 131 8, 81 -70
      C 49 -122, 15 -156, -11 -166
      Z"
      fill="#1c8de8"
      stroke="#0e7dcc"
      stroke-width="7"
      stroke-linejoin="round"
      stroke-linecap="round"/>

    <!-- sketchy double strokes for hand-drawn feel -->
    <path d="M -15 -158 C -85 -64, -141 10, -123 78"
          fill="none" stroke="#0e7dcc" stroke-width="4.5"
          stroke-linecap="round" opacity="0.5"/>
    <path d="M 85 -66 C 139 10, 127 98, 79 126"
          fill="none" stroke="#0e7dcc" stroke-width="4.5"
          stroke-linecap="round" opacity="0.5"/>
    <path d="M -119 86 C -81 140, 15 158, 77 128"
          fill="none" stroke="#0e7dcc" stroke-width="4.5"
          stroke-linecap="round" opacity="0.4"/>

    <!-- interior white sketch highlights -->
    <path d="M -57 -64 Q -33 -112, -7 -132"
          fill="none" stroke="#ffffff" stroke-width="9"
          stroke-linecap="round" opacity="0.55"/>
    <path d="M -109 38 Q -89 -20, -63 -52"
          fill="none" stroke="#ffffff" stroke-width="6.5"
          stroke-linecap="round" opacity="0.35"/>
    <path d="M -73 104 Q -39 130, 7 134"
          fill="none" stroke="#ffffff" stroke-width="5.5"
          stroke-linecap="round" opacity="0.4"/>

    <!-- two dot eyes, upper-right -->
    <circle cx="35" cy="-56" r="7" fill="#ffffff"/>
    <circle cx="63" cy="-50" r="7" fill="#ffffff"/>
  </g>
</svg>
