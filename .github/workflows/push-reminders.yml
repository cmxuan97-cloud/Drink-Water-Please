name: Push Reminders

on:
  schedule:
    # 主 cron 已经搬到 cron-job.org（更稳定）。
    # 这里只作为 backup —— 万一 cron-job.org 出问题，每 4 小时兜底一次。
    # 服务端 lastSentAt dedup，所以两个 cron 同时跑也不会重复发。
    - cron: '0 */4 * * *'
  workflow_dispatch: {}    # 也允许手动触发

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel push send endpoint
        run: |
          if [ -z "${{ secrets.VERCEL_DOMAIN }}" ] || [ -z "${{ secrets.CRON_SECRET }}" ]; then
            echo "❌ 未设置 secrets VERCEL_DOMAIN 或 CRON_SECRET，跳过"
            exit 0
          fi
          echo "Calling https://${{ secrets.VERCEL_DOMAIN }}/api/push/send?secret=*** ..."
          response=$(curl -fsS -X POST \
            "https://${{ secrets.VERCEL_DOMAIN }}/api/push/send?secret=${{ secrets.CRON_SECRET }}" \
            || echo '{"ok":false,"error":"curl failed"}')
          echo "Response: $response"
